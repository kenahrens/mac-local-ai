# Continue config (~/.continue/config.yaml). Used in VS Code and VSCodium, where
# Continue is the AI layer because Copilot isn't available on VSCodium and we
# want a consistent setup across both editors.
#
# Points at local oMLX (Gemma 31B for chat/edit, Nemotron for fast autocomplete)
# with Claude as a cloud fallback when local isn't enough. DS4 is intentionally
# not in this default config: it's an on-demand model (see ../../ds4/ds4-on.sh)
# and Continue would try to ping a stopped server. Add it back in if you keep
# DS4 running.
#
# Docs: https://docs.continue.dev/reference

name: local-and-cloud
version: 0.0.1
schema: v1

models:
  # Local smart model: day-to-day chat and edits. Smart enough to reason about
  # code, free to run.
  - name: oMLX Gemma 31B (local)
    provider: openai
    model: gemma-4-31b-it-4bit
    apiBase: http://localhost:38010/v1
    apiKey: unused
    roles: [chat, edit, apply]

  # Local fast model: autocomplete needs to be quick. Nemotron's MoE makes it
  # roughly 6x faster than Gemma at the same hardware footprint.
  - name: oMLX Nemotron 30B (local, fast)
    provider: openai
    model: NVIDIA-Nemotron-3-Nano-30B-A3B-4bit
    apiBase: http://localhost:38010/v1
    apiKey: unused
    roles: [autocomplete, apply]

  # Cloud fallback for anything local can't handle. Continue prompts for the
  # secret the first time it's needed.
  - name: Claude Sonnet (cloud)
    provider: anthropic
    model: claude-sonnet-4-6
    apiKey: ${{ secrets.ANTHROPIC_API_KEY }}
    roles: [chat, edit]

# MCP servers live in ~/.continue/mcpServers/*.yaml.
# The canonical roster is in ../mcp/servers.json; run ../mcp/generate.py to
# emit each editor's per-format file (Continue gets one yaml per server).
